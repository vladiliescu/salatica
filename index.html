<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F8F6F1;
    --card: #FFFFFF;
    --primary: #5A7A5C;
    --primary-light: #E8EFE8;
    --accent: #C2613A;
    --accent-light: #FCEEE8;
    --text: #1C1C1A;
    --muted: #8A857D;
    --chip-bg: #EDEAE4;
    --chip-hover: #E2DED6;
    --missing: #C5C0B8;
    --border: #E5E1DA;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 20px rgba(0,0,0,0.1);
  }

  html { font-size: 16px; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  header {
    padding: 40px 0 24px;
    text-align: center;
  }
  header .logo {
    width: 64px;
    height: 64px;
    display: block;
    margin: 0 auto 10px;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.08));
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  header p {
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* Ingredient sections */
  .ingredients-panel {
    background: var(--card);
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 32px;
  }
  .category {
    margin-bottom: 20px;
  }
  .category:last-child { margin-bottom: 0; }
  .category-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .category-label span { font-size: 1rem; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid transparent;
    background: var(--chip-bg);
    color: var(--text);
    transition: all 0.2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:hover { background: var(--chip-hover); }
  .chip.selected {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* Counter */
  .counter {
    text-align: center;
    margin-bottom: 24px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .counter strong {
    color: var(--primary);
    font-weight: 600;
  }

  /* Results */
  .results-header {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
    margin-bottom: 16px;
    padding-left: 4px;
  }
  .results-count {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    vertical-align: middle;
    margin-left: 4px;
  }
  .salad-card + .results-header { margin-top: 28px; }
  .no-results {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.7;
  }
  .no-results .icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* Salad cards */
  .salad-card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .salad-card:hover { box-shadow: var(--shadow-hover); }
  .salad-card.ready { border-left: 4px solid var(--primary); }
  .salad-card.almost { border-left: 4px solid var(--accent); }
  .salad-card.idea { border-left: 4px solid var(--missing); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    font-weight: 400;
    line-height: 1.3;
  }

  /* Match circle */
  .match-circle {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    position: relative;
  }
  .match-circle svg {
    transform: rotate(-90deg);
    width: 48px;
    height: 48px;
  }
  .match-circle .bg-ring {
    fill: none;
    stroke: var(--chip-bg);
    stroke-width: 4;
  }
  .match-circle .fg-ring {
    fill: none;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
  }
  .match-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
  }

  /* Ingredient tags in card */
  .card-ingredients {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .ing-tag {
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }
  .ing-tag.have {
    background: var(--primary-light);
    color: var(--primary);
  }
  .ing-tag.need {
    background: #F0EEEA;
    color: var(--missing);
  }
  .ing-tag .alt {
    font-weight: 400;
    opacity: 0.65;
    font-size: 0.92em;
  }

  /* Dressing & tip */
  .card-dressing {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-dressing strong {
    font-weight: 600;
    color: #6B665E;
  }
  .card-tip {
    font-size: 0.82rem;
    color: var(--accent);
    font-style: italic;
    line-height: 1.5;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }

  /* Clear button */
  .clear-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .clear-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Status badges */
  .status-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .status-badge.ready {
    background: var(--primary-light);
    color: var(--primary);
  }
  .status-badge.almost {
    background: var(--accent-light);
    color: var(--accent);
  }
  .status-badge.idea {
    background: #F0EEEA;
    color: var(--muted);
  }
  .ideas-more {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    padding: 4px 0 8px;
  }

  footer {
    text-align: center;
    padding: 32px 0 48px;
    font-size: 0.78rem;
    color: var(--missing);
  }

  /* Screen-reader-only text */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* Quick filters + surprise */
  .filters { margin-bottom: 24px; }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .filter-radios {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    padding: 6px 13px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
  .filter-chip.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  /* keyboard focus ring on the visually-hidden radio, shown on its pill */
  .filter-chip:has(:focus-visible) { outline: 2px solid var(--primary); outline-offset: 2px; }
  .filter-chip.surprise {
    margin-left: auto;
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-chip.surprise:hover { background: var(--accent-light); color: var(--accent); }

  .filter-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.45;
    margin-top: 8px;
  }

  .surprise-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 6px;
  }

  /* Mobile "jump to results" bar — phone only, fades out once results show */
  .results-bar { display: none; }
  @media (max-width: 700px) {
    /* Clearance so the fixed bar never permanently covers the footer / last card. */
    body { padding-bottom: 76px; }
    .results-bar {
      display: flex;
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 50;
      justify-content: center;
      padding: 12px 16px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg) 65%, rgba(248,246,241,0));
      pointer-events: none;
    }
    .results-bar button {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 12px 22px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      cursor: pointer;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .results-bar.hidden button {
      opacity: 0;
      transform: translateY(140%);
      pointer-events: none;
    }
  }

  @media (max-width: 480px) {
    header h1 { font-size: 1.7rem; }
    .ingredients-panel { padding: 18px 16px; }
    .salad-card { padding: 16px; }
    .chip { padding: 6px 12px; font-size: 0.82rem; }
  }
</style>
</head>

  },
  {

    ingredients: ['naut','ardei-copti','rosii','ceapa','dovleac','patrunjel'],

    tip: 'Ardei copți dulci, năut cremos, semințe de dovleac crocante. Boia afumată leagă totul.'
  },
  {
    name: 'Spinach cu Telemea și Semințe de Dovleac',
    ingredients: ['spinach','telemea','rosii','dovleac','ceapa'],
    dressing: 'Lămâie, ulei de măsline',
    tip: 'Simplă și sățioasă. Telemeaua sărată, dovleacul crocant — sau feta și alte semințe dacă asta ai.'
  },
];

// ─── HELPERS ────────────────────────────────────────────────────

const ingredientMap = {};
INGREDIENTS.forEach(i => ingredientMap[i.id] = i.name);

// Interchangeable ingredients: any member satisfies a recipe that calls for
// another member of the same group. The recipe still displays its canonical
// ingredient, with a small "sau …" hint so you know what's swappable.
const SUB_GROUPS = [
  { ids: ['feta', 'telemea'], hint: 'sau alt tip de brânză albă' },
  { ids: ['pin', 'floarea', 'dovleac'], hint: 'sau alte semințe' },
];
// id → array of substitute ids
const SUBS = {};
SUB_GROUPS.forEach(g => g.ids.forEach(id => SUBS[id] = g.ids.filter(x => x !== id)));

// Do we have what this recipe ingredient needs — directly or via a substitute?
function isSatisfied(reqId, selected) {
  if (selected.has(reqId)) return true;
  return (SUBS[reqId] || []).some(alt => selected.has(alt));
}
// Short "sau …" hint for a recipe ingredient that has substitutes.
function subHint(id) {
  if (!SUBS[id]) return '';
  const group = SUB_GROUPS.find(g => g.ids.includes(id));
  if (group.ids.length === 2) return `sau ${ingredientMap[SUBS[id][0]].toLowerCase()}`;
  return group.hint;
}
// Ingredient tag markup: canonical name + a subtle swap hint when applicable.
function tagLabel(id) {
  const hint = subHint(id);
  return ingredientMap[id] + (hint ? ` <span class="alt">${hint}</span>` : '');
}

// "Fridge model": the question is "what can I make with what I have?", so
// ingredients you have but a recipe doesn't use NEVER disqualify it — and a
// selection that overlaps any recipe is NEVER answered with "nothing". We keep
// every recipe that uses at least one thing you have, ranked by completeness,
// and let the tiers (below) prioritise instead of excluding.
const MAX_MISSING = 2; // up to this many missing → still counts as "Aproape"

// Which bucket a matched recipe falls in:
//   0 = gata de făcut (nothing missing)
//   1 = aproape (missing 1–MAX_MISSING and you already have the majority)
//   2 = idei (everything else that overlaps — ranked, but further off)
function tierOf(s) {
  if (s.need.length === 0) return 0;
  if (s.need.length <= MAX_MISSING && s.have.length >= s.need.length) return 1;
  return 2;
}

function computeMatches(selected) {
  if (selected.size === 0) return [];

  return SALADS.map(salad => {
    const have = salad.ingredients.filter(id => isSatisfied(id, selected));
    const need = salad.ingredients.filter(id => !isSatisfied(id, selected));
    const pct = Math.round((have.length / salad.ingredients.length) * 100);
    return { ...salad, have, need, pct };
  })
  .filter(s => s.have.length > 0)
  .sort((a, b) => {
    if (b.pct !== a.pct) return b.pct - a.pct;                  // most complete first
    if (a.need.length !== b.need.length) return a.need.length - b.need.length;
    return a.ingredients.length - b.ingredients.length;        // then simplest
  });
}

// ─── FILTERS ────────────────────────────────────────────────────
// A single radio chooses how strict the match is; "Surprinde-mă" picks one
// recipe from the chosen set so you don't have to — the "take a position"
// principle. "Toate" is the default and keeps the loose "fridge model".

// Is a selected ingredient actually used by this recipe — directly, or as a
// stand-in for one of its ingredients (feta⇄telemea, the seed group)?
function recipeUses(recipeIngredients, selId) {
  if (recipeIngredients.includes(selId)) return true;
  return (SUBS[selId] || []).some(alt => recipeIngredients.includes(alt));
}
// Does this recipe use every ingredient the user selected (no wasted picks)?
function usesAllSelected(s) {
  for (const id of selected) {
    if (!recipeUses(s.ingredients, id)) return false;
  }
  return true;
}

const FILTERS = [
  { id: 'all',     label: 'Toate',
    info: 'Model frigider: orice rețetă care folosește măcar un ingredient pe care îl ai.',
    test: () => true },
  { id: 'usesall', label: 'Folosesc tot ce-am ales',
    info: 'Doar rețete care folosesc fiecare ingredient ales — nimic din ce ai ales nu e ignorat (dar pot lipsi lucruri pe care nu le ai).',
    test: s => usesAllSelected(s) },
  { id: 'exact',   label: 'Exact ce am ales',
    info: 'Doar rețete pe care le poți face acum și care folosesc fix ce ai ales — selecția ta = rețeta. Cel mai strict.',
    test: s => s.need.length === 0 && usesAllSelected(s) },
  { id: 'ready',   label: 'Gata de făcut',
    info: 'Doar rețete pe care le poți face acum; pot ignora ingrediente în plus pe care le-ai ales.',
    test: s => tierOf(s) === 0 },
];

function activeFilterDef() {
  return FILTERS.find(f => f.id === activeFilter) || FILTERS[0];
}
function applyFilters(matches) {
  return matches.filter(activeFilterDef().test);
}

// ─── RENDER ─────────────────────────────────────────────────────

const app = document.getElementById('app');
let selected = new Set();
let activeFilter = 'all';   // which strictness radio is selected (see FILTERS)
let surprise = null;        // name of the featured recipe when "Surprinde-mă" is on
let resultsObserver = null; // hides the mobile bar once results scroll into view

function render() {
  const allMatches = computeMatches(selected);
  const matches = applyFilters(allMatches);
  // Drop a stale surprise pick that the current selection/filters no longer yield.
  if (surprise && !matches.some(m => m.name === surprise)) surprise = null;

  app.innerHTML =
    renderIngredients() +
    renderCounter() +
    renderFilters(allMatches) +
    `<div id="results">${renderResults(matches)}</div>` +
    renderResultsBar(matches);

  bindEvents();
  observeResults();
}

function renderIngredients() {
  let html = '<div class="ingredients-panel">';
  CATEGORIES.forEach(cat => {
    const items = INGREDIENTS.filter(i => i.cat === cat.id);
    if (items.length === 0) return;
    html += `<div class="category">
      <div class="category-label"><span aria-hidden="true">${cat.emoji}</span> ${cat.label}</div>
      <div class="chips" role="group" aria-label="${cat.label}">`;
    items.forEach(item => {
      const on = selected.has(item.id);
      html += `<button type="button" class="chip${on ? ' selected' : ''}" data-id="${item.id}" aria-pressed="${on}">${item.name}</button>`;
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function renderCounter() {
  if (selected.size === 0) return '';
  return `<div class="counter">
    <strong>${selected.size}</strong> ingredient${selected.size > 1 ? 'e' : ''} selectat${selected.size > 1 ? 'e' : ''}
    &nbsp;·&nbsp;
    <button class="clear-btn" id="clear-all">✕ Resetează</button>
  </div>`;
}

function renderFilters(allMatches) {
  if (selected.size === 0 || allMatches.length === 0) return '';
  const radios = FILTERS.map(f => {
    const on = activeFilter === f.id;
    return `<label class="filter-chip${on ? ' active' : ''}" title="${f.info}">
      <input type="radio" class="sr-only" name="filter" value="${f.id}"${on ? ' checked' : ''}>
      ${f.label}
    </label>`;
  }).join('');
  return `<div class="filters">
    <div class="filter-row">
      <div class="filter-radios" role="radiogroup" aria-label="Cât de strict caut">
        ${radios}
      </div>
      <button type="button" class="filter-chip surprise" id="surprise-btn" title="Alege o rețetă la întâmplare din ce ai filtrat"><span aria-hidden="true">🎲</span> Surprinde-mă</button>
    </div>
    <p class="filter-desc" aria-live="polite">${activeFilterDef().info}</p>
  </div>`;
}

function renderResults(matches) {
  if (selected.size === 0) {
    return `<div class="no-results">
      <div class="icon" aria-hidden="true">🥗</div>
      Alege ingredientele pe care le ai.<br>Eu îți arăt ce poți face cu ele.
    </div>`;
  }

  if (matches.length === 0) {
    if (activeFilter !== 'all') {
      return `<div class="no-results">
        <div class="icon" aria-hidden="true">🧺</div>
        Niciun rezultat cu filtrul ăsta.<br>Alege „Toate" sau mai adaugă ingrediente.
      </div>`;
    }
    return `<div class="no-results">
      <div class="icon" aria-hidden="true">🤔</div>
      Niciuna din rețete nu folosește ce ai ales.<br>Încearcă o bază: năut, fasole, sau baby spinach.
    </div>`;
  }

  if (surprise) {
    const pick = matches.find(m => m.name === surprise);
    if (pick) {
      return `<div class="results-header">Sugestia mea <span aria-hidden="true">🎲</span></div>
        ${renderCard(pick)}
        <div class="surprise-actions">
          <button type="button" class="clear-btn" id="surprise-again"><span aria-hidden="true">🎲</span> Altă sugestie</button>
          <button type="button" class="clear-btn" id="surprise-clear">Vezi toate</button>
        </div>`;
    }
  }

  const IDEAS_CAP = 8;
  const ready  = matches.filter(s => tierOf(s) === 0);
  const almost = matches.filter(s => tierOf(s) === 1);
  const ideas  = matches.filter(s => tierOf(s) === 2);

  let html = '';
  if (ready.length) {
    html += `<div class="results-header">Gata de făcut <span class="results-count">${ready.length}</span></div>`;
    html += ready.map(renderCard).join('');
  }
  if (almost.length) {
    html += `<div class="results-header">Aproape — îți mai trebuie 1–2 <span class="results-count">${almost.length}</span></div>`;
    html += almost.map(renderCard).join('');
  }
  if (ideas.length) {
    html += `<div class="results-header">Idei cu ce ai <span class="results-count">${ideas.length}</span></div>`;
    html += ideas.slice(0, IDEAS_CAP).map(renderCard).join('');
    if (ideas.length > IDEAS_CAP) {
      html += `<div class="ideas-more">+ încă ${ideas.length - IDEAS_CAP} dacă mai adaugi câteva ingrediente</div>`;
    }
  }
  return html;
}

function renderCard(s) {
  const tier = tierOf(s);
  const cardClass = tier === 0 ? ' ready' : tier === 1 ? ' almost' : ' idea';
  const ringColor = tier === 0 ? 'var(--primary)' : tier === 1 ? 'var(--accent)' : 'var(--missing)';

  // SVG circle math
  const r = 20;
  const circ = 2 * Math.PI * r;
  const offset = circ - (s.pct / 100) * circ;

  const badge = tier === 0
    ? ''
    : `<span class="status-badge ${tier === 1 ? 'almost' : 'idea'}">Lipsește ${s.need.length}</span>`;

  return `<div class="salad-card${cardClass}">
    <div class="card-top">
      <div>
        ${badge}
        <div class="card-name">${s.name}</div>
      </div>
      <div class="match-circle" role="img"
        aria-label="Ai ${s.have.length} din ${s.ingredients.length} ingrediente (${s.pct}%)">
        <svg viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <circle class="bg-ring" cx="24" cy="24" r="${r}"/>
          <circle class="fg-ring" cx="24" cy="24" r="${r}"
            stroke="${ringColor}"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="match-pct" aria-hidden="true" style="color:${ringColor}">${s.pct}%</div>
      </div>
    </div>
    <div class="card-ingredients">
      ${s.have.map(id => `<span class="ing-tag have" aria-label="ai ${ingredientMap[id]}">${tagLabel(id)}</span>`).join('')}
      ${s.need.map(id => `<span class="ing-tag need" aria-label="îți lipsește ${ingredientMap[id]}">${tagLabel(id)}</span>`).join('')}
    </div>
    <div class="card-dressing"><strong>Dressing:</strong> ${s.dressing}</div>
    <div class="card-tip">${s.tip}</div>
  </div>`;
}

// Mobile-only bar that jumps to the results. Label leads with the most useful
// number: how many you can make right now, falling back to the total.
function renderResultsBar(matches) {
  if (selected.size === 0 || matches.length === 0) return '';
  const ready = matches.filter(s => tierOf(s) === 0).length;
  let label;
  if (surprise) label = 'Vezi sugestia ↓';
  else if (ready) label = `${ready} gata de făcut ↓`;
  else {
    const n = matches.length;
    const word = n === 1 ? 'salată' : n >= 20 ? 'de salate' : 'salate';
    label = `${n} ${word} ↓`;
  }
  return `<div class="results-bar" id="results-bar">
    <button type="button" id="results-bar-btn" aria-label="Sari la rezultate">${label}</button>
  </div>`;
}

// Pick one recipe from the filtered set, preferring ready-to-make ones. When
// re-rolling, exclude the current pick so you always get something different.
function pickSurprise() {
  const pool = applyFilters(computeMatches(selected));
  if (!pool.length) return;
  const ready = pool.filter(s => tierOf(s) === 0);
  let choices = ready.length ? ready : pool;
  if (choices.length > 1) choices = choices.filter(s => s.name !== surprise);
  surprise = choices[Math.floor(Math.random() * choices.length)].name;
  render();
}

// Fade the mobile bar out once the results region scrolls into view.
function observeResults() {
  if (resultsObserver) { resultsObserver.disconnect(); resultsObserver = null; }
  const bar = document.getElementById('results-bar');
  const results = document.getElementById('results');
  if (!bar || !results || !('IntersectionObserver' in window)) return;
  resultsObserver = new IntersectionObserver(entries => {
    entries.forEach(e => bar.classList.toggle('hidden', e.isIntersecting));
  }, { threshold: 0, rootMargin: '0px 0px -120px 0px' });
  resultsObserver.observe(results);
}

// render() replaces the whole panel via innerHTML, which drops keyboard focus.
// After a re-render, restore focus to the equivalent control by selector so
// keyboard/screen-reader users don't get bounced to the top on every toggle.
function rerenderKeepingFocus(selector) {
  render();
  if (selector) document.querySelector(selector)?.focus();
}

function bindEvents() {
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = chip.dataset.id;
      if (selected.has(id)) selected.delete(id);
      else selected.add(id);
      rerenderKeepingFocus(`.chip[data-id="${id}"]`);
    });
  });

  document.querySelectorAll('input[name="filter"]').forEach(radio => {
    radio.addEventListener('change', () => {
      activeFilter = radio.value;
      // Keep focus on the (re-rendered) selected radio so keyboard arrow-key
      // navigation through the group keeps working across re-renders.
      rerenderKeepingFocus(`input[name="filter"][value="${radio.value}"]`);
    });
  });

  // After picking/re-rolling, land focus on "Altă sugestie" so re-rolling is
  // a single repeated keypress. pickSurprise() calls render() internally.
  const roll = () => { pickSurprise(); document.getElementById('surprise-again')?.focus(); };
  const surpriseBtn = document.getElementById('surprise-btn');
  if (surpriseBtn) surpriseBtn.addEventListener('click', roll);

  const surpriseAgain = document.getElementById('surprise-again');
  if (surpriseAgain) surpriseAgain.addEventListener('click', roll);

  const surpriseClear = document.getElementById('surprise-clear');
  if (surpriseClear) surpriseClear.addEventListener('click', () => {
    surprise = null;
    rerenderKeepingFocus('#surprise-btn');
  });

  const barBtn = document.getElementById('results-bar-btn');
  if (barBtn) {
    barBtn.addEventListener('click', () => {
      const results = document.getElementById('results');
      if (results) results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  const clearBtn = document.getElementById('clear-all');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      selected.clear();
      activeFilter = 'all';
      surprise = null;
      render();
    });
  }
}

// Initial render
render();

// ─── PWA ─────────────────────────────────────────────────────────
// Register relative to the page so it works under GitHub Pages subpaths.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
